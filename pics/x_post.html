<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0518 0%, #120830 30%, #0d1a3a 60%, #091428 100%);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    position: relative;
  }
  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .orb1 {
    width: 500px; height: 500px;
    top: -200px; right: -50px;
    background: radial-gradient(circle, rgba(120,60,220,0.25), transparent 70%);
  }
  .orb2 {
    width: 400px; height: 400px;
    bottom: -150px; left: -100px;
    background: radial-gradient(circle, rgba(40,100,220,0.2), transparent 70%);
  }
  .orb3 {
    width: 300px; height: 300px;
    top: 50%; left: 45%;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(180,80,255,0.08), transparent 70%);
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 28px 32px;
    gap: 24px;
  }

  .panel {
    border-radius: 18px;
    overflow: hidden;
    position: relative;
  }

  .panel-ai {
    flex: 0 0 auto;
    width: 380px;
    height: 520px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(120,60,220,0.15),
      inset 0 1px 0 rgba(255,255,255,0.05);
    border: 1.5px solid rgba(140,100,220,0.35);
    transform: perspective(800px) rotateY(3deg);
  }
  .panel-ai img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* Arrow */
  .arrow {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .arrow-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, rgba(140,100,255,0.8), rgba(80,180,255,0.8));
    border-radius: 2px;
    position: relative;
  }
  .arrow-line::after {
    content: "";
    position: absolute;
    right: -8px;
    top: -6px;
    border: 7px solid transparent;
    border-left: 10px solid rgba(80,180,255,0.8);
  }
  .arrow-label {
    color: rgba(180,160,255,0.7);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .panel-pdf {
    flex: 0 0 auto;
    width: 520px;
    height: 520px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(60,120,220,0.15),
      inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1.5px solid rgba(100,140,220,0.35);
    transform: perspective(800px) rotateY(-2deg);
  }
  .panel-pdf img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Label badges */
  .badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    white-space: nowrap;
    z-index: 2;
  }
  .badge-ai {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: #e8dff5;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
  }
  .badge-output {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #dbeafe;
    box-shadow: 0 4px 15px rgba(37,99,235,0.4);
  }

  /* Bottom text */
  .footer {
    position: absolute;
    bottom: 16px;
    right: 32px;
    z-index: 2;
    color: rgba(160,150,200,0.5);
    font-size: 13px;
    font-weight: 400;
  }
  .title {
    position: absolute;
    top: 10px;
    left: 32px;
    z-index: 2;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(90deg, rgba(180,150,255,0.8), rgba(100,180,255,0.6));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
