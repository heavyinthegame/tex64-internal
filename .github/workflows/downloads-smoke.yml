name: Downloads Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Upload and fetch health.txt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Require downloads secrets
        shell: bash
        env:
          TEX64_DOWNLOADS_PUBLIC_BASE_URL: ${{ secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL }}
          TEX64_DOWNLOADS_BUCKET: ${{ secrets.TEX64_DOWNLOADS_BUCKET }}
          TEX64_DOWNLOADS_ACCESS_KEY_ID: ${{ secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID }}
          TEX64_DOWNLOADS_SECRET_ACCESS_KEY: ${{ secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            value="$1"
            name="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          }
          require_secret "${TEX64_DOWNLOADS_PUBLIC_BASE_URL}" "TEX64_DOWNLOADS_PUBLIC_BASE_URL"
          require_secret "${TEX64_DOWNLOADS_BUCKET}" "TEX64_DOWNLOADS_BUCKET"
          require_secret "${TEX64_DOWNLOADS_ACCESS_KEY_ID}" "TEX64_DOWNLOADS_ACCESS_KEY_ID"
          require_secret "${TEX64_DOWNLOADS_SECRET_ACCESS_KEY}" "TEX64_DOWNLOADS_SECRET_ACCESS_KEY"
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Upload health.txt to downloads (S3/R2)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TEX64_DOWNLOADS_REGION }}
          TEX64_DOWNLOADS_BUCKET: ${{ secrets.TEX64_DOWNLOADS_BUCKET }}
          TEX64_DOWNLOADS_ENDPOINT: ${{ secrets.TEX64_DOWNLOADS_ENDPOINT }}
        run: |
          set -euo pipefail
          export AWS_EC2_METADATA_DISABLED=true
          export AWS_REGION="${AWS_REGION:-auto}"
          export AWS_DEFAULT_REGION="$AWS_REGION"
          export AWS_S3_FORCE_PATH_STYLE=true

          bucket="${TEX64_DOWNLOADS_BUCKET}"
          endpoint="${TEX64_DOWNLOADS_ENDPOINT:-}"

          awsArgs=()
          if [ -n "$endpoint" ]; then
            awsArgs+=(--endpoint-url "$endpoint")
          fi

          now="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "ok"
            echo "time=${now}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
          } > health.txt

          echo "Uploading s3://${bucket}/health.txt (region=${AWS_REGION})"
          aws "${awsArgs[@]}" s3 cp \
            health.txt \
            "s3://${bucket}/health.txt" \
            --cache-control "public,max-age=0,no-cache"

      - name: Fetch via public URL
        shell: bash
        env:
          TEX64_DOWNLOADS_PUBLIC_BASE_URL: ${{ secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          url="${TEX64_DOWNLOADS_PUBLIC_BASE_URL%/}/health.txt"
          echo "GET $url"
          curl -fsSL "$url" | head -n 20

