name: Build Distributables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          const version = tag.replace(/^v/, "");
          if (!version || !/^\d+\.\d+\.\d+/.test(version)) {
            console.log(`skip version sync for tag: ${tag}`);
            process.exit(0);
          }
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.version = version;
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          console.log(`package.json version -> ${version}`);
          NODE

      - name: Require macOS signing/notarization secrets for tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TEX64_MACOS_CERT_P12_BASE64: ${{ secrets.TEX64_MACOS_CERT_P12_BASE64 }}
          TEX64_MACOS_CERT_PASSWORD: ${{ secrets.TEX64_MACOS_CERT_PASSWORD }}
          TEX64_APPLE_ID: ${{ secrets.TEX64_APPLE_ID }}
          TEX64_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.TEX64_APPLE_APP_SPECIFIC_PASSWORD }}
          TEX64_APPLE_TEAM_ID: ${{ secrets.TEX64_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            value="$1"
            name="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          }
          require_secret "${TEX64_MACOS_CERT_P12_BASE64}" "TEX64_MACOS_CERT_P12_BASE64"
          require_secret "${TEX64_MACOS_CERT_PASSWORD}" "TEX64_MACOS_CERT_PASSWORD"
          require_secret "${TEX64_APPLE_ID}" "TEX64_APPLE_ID"
          require_secret "${TEX64_APPLE_APP_SPECIFIC_PASSWORD}" "TEX64_APPLE_APP_SPECIFIC_PASSWORD"
          require_secret "${TEX64_APPLE_TEAM_ID}" "TEX64_APPLE_TEAM_ID"
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare macOS signing and notarization env
        shell: bash
        env:
          TEX64_MACOS_CERT_P12_BASE64: ${{ secrets.TEX64_MACOS_CERT_P12_BASE64 }}
          TEX64_MACOS_CERT_PASSWORD: ${{ secrets.TEX64_MACOS_CERT_PASSWORD }}
          TEX64_APPLE_ID: ${{ secrets.TEX64_APPLE_ID }}
          TEX64_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.TEX64_APPLE_APP_SPECIFIC_PASSWORD }}
          TEX64_APPLE_TEAM_ID: ${{ secrets.TEX64_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${TEX64_MACOS_CERT_P12_BASE64}" ] && [ -n "${TEX64_MACOS_CERT_PASSWORD}" ]; then
            certPath="${RUNNER_TEMP}/tex64-macos-signing.p12"
            CERT_B64="${TEX64_MACOS_CERT_P12_BASE64}" CERT_PATH="${certPath}" node -e "const fs=require('fs');fs.writeFileSync(process.env.CERT_PATH, Buffer.from(process.env.CERT_B64,'base64'));"
            {
              echo "CSC_LINK=${certPath}"
              echo "CSC_KEY_PASSWORD=${TEX64_MACOS_CERT_PASSWORD}"
            } >> "$GITHUB_ENV"
            if [ -n "${TEX64_APPLE_ID}" ] && [ -n "${TEX64_APPLE_APP_SPECIFIC_PASSWORD}" ] && [ -n "${TEX64_APPLE_TEAM_ID}" ]; then
              {
                echo "APPLE_ID=${TEX64_APPLE_ID}"
                echo "APPLE_APP_SPECIFIC_PASSWORD=${TEX64_APPLE_APP_SPECIFIC_PASSWORD}"
                echo "APPLE_TEAM_ID=${TEX64_APPLE_TEAM_ID}"
              } >> "$GITHUB_ENV"
              echo "macOS notarization: enabled"
            else
              echo "macOS notarization: disabled (Apple credentials missing)"
            fi
            echo "macOS signing: enabled"
          else
            echo "macOS signing: disabled (certificate secrets missing)"
          fi

      - name: Build distributables
        shell: bash
        run: |
          set -euo pipefail
          npm run -s dist:prep
          npm run -s web:build
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx --no-install electron-builder --mac --arm64 --publish never
          else
            npx --no-install electron-builder --mac --x64 --publish never
          fi

      - name: Cleanup signing files
        if: always()
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}/tex64-macos-signing.p12" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tex64-macos-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Require downloads secrets for tagged release
        if: startsWith(github.ref, 'refs/tags/v') && (secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL != '' || secrets.TEX64_DOWNLOADS_BUCKET != '' || secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID != '' || secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY != '')
        shell: bash
        env:
          TEX64_DOWNLOADS_PUBLIC_BASE_URL: ${{ secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL }}
          TEX64_DOWNLOADS_BUCKET: ${{ secrets.TEX64_DOWNLOADS_BUCKET }}
          TEX64_DOWNLOADS_ACCESS_KEY_ID: ${{ secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID }}
          TEX64_DOWNLOADS_SECRET_ACCESS_KEY: ${{ secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          require_secret() {
            value="$1"
            name="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          }
          require_secret "${TEX64_DOWNLOADS_PUBLIC_BASE_URL}" "TEX64_DOWNLOADS_PUBLIC_BASE_URL"
          require_secret "${TEX64_DOWNLOADS_BUCKET}" "TEX64_DOWNLOADS_BUCKET"
          require_secret "${TEX64_DOWNLOADS_ACCESS_KEY_ID}" "TEX64_DOWNLOADS_ACCESS_KEY_ID"
          require_secret "${TEX64_DOWNLOADS_SECRET_ACCESS_KEY}" "TEX64_DOWNLOADS_SECRET_ACCESS_KEY"
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          rm -rf release
          mkdir -p release
          find artifacts -type f \( \
            -name '*.dmg' -o -name '*.zip' \
          \) -print0 | while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            cp "$file" "release/$base"
          done
          ls -la release

      - name: Generate checksums
        run: node scripts/release-checksums.cjs --dir release --out release/checksums-sha256.txt

      - name: Write release operator summary
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "## tex64.com sync checklist"
            echo ""
            echo "- Set \`NEXT_PUBLIC_TEX64_DOWNLOADS_PUBLIC_BASE_URL\` (example: \`https://downloads.tex64.com\`)."
            echo "- Set \`TEX64_UPDATE_REMOTE_BASE_URL\` (example: \`https://downloads.tex64.com/tex64/updates\`)."
            echo "- Import checksum file into tex64.com:"
            echo "  \`npm run -s release:import-checksums -- --version ${version} --file /path/to/checksums-sha256.txt\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate update feed (stable)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL != ''
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          publicBaseUrl="${{ secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL }}"
          notesUrl="https://tex64.com/releases/${version}"
          mkdir -p update
          node scripts/release-update-feed.cjs \
            --dir release \
            --out update/stable.json \
            --channel stable \
            --version "$version" \
            --artifactsBaseUrl "${publicBaseUrl%/}/tex64/v${version}" \
            --notesUrl "$notesUrl"
          ls -la update

      - name: Upload assets to downloads (S3/R2)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.TEX64_DOWNLOADS_BUCKET != '' && secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID != '' && secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY != '' && secrets.TEX64_DOWNLOADS_PUBLIC_BASE_URL != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TEX64_DOWNLOADS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEX64_DOWNLOADS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TEX64_DOWNLOADS_REGION }}
          TEX64_DOWNLOADS_BUCKET: ${{ secrets.TEX64_DOWNLOADS_BUCKET }}
          TEX64_DOWNLOADS_ENDPOINT: ${{ secrets.TEX64_DOWNLOADS_ENDPOINT }}
        run: |
          set -euo pipefail
          export AWS_EC2_METADATA_DISABLED=true

          version="${GITHUB_REF_NAME#v}"
          prefix="tex64/v${version}"
          updatePrefix="tex64/updates"
          bucket="${TEX64_DOWNLOADS_BUCKET}"
          endpoint="${TEX64_DOWNLOADS_ENDPOINT:-}"
          export AWS_REGION="${AWS_REGION:-auto}"
          export AWS_DEFAULT_REGION="$AWS_REGION"
          export AWS_S3_FORCE_PATH_STYLE=true

          awsArgs=()
          if [ -n "$endpoint" ]; then
            awsArgs+=(--endpoint-url "$endpoint")
          fi

          echo "Uploading release assets to s3://${bucket}/${prefix}/ (region=${AWS_REGION})"
          aws "${awsArgs[@]}" s3 sync \
            release \
            "s3://${bucket}/${prefix}/" \
            --cache-control "public,max-age=31536000,immutable"

          if [ -f "update/stable.json" ]; then
            echo "Uploading update feed to s3://${bucket}/${updatePrefix}/stable.json"
            aws "${awsArgs[@]}" s3 cp \
              "update/stable.json" \
              "s3://${bucket}/${updatePrefix}/stable.json" \
              --cache-control "public,max-age=60"
          fi

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v') && secrets.TEX64_PUBLISH_GITHUB_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
