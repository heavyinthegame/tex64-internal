name: Nightly Input Tests

on:
  schedule:
    # 10:00 UTC = 02:00 PST / 03:00 PDT
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-input-tests
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEX64_FUZZ_ROUNDS: "3000"
      TEX64_PERF_ITERS: "25000"
      TEX64_PERF_MAX_MS: "4000"
      NIGHTLY_ALERT_LABEL: ${{ vars.NIGHTLY_ALERT_LABEL }}
      NIGHTLY_ALERT_ASSIGNEE: ${{ vars.NIGHTLY_ALERT_ASSIGNEE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run nightly test suite
        shell: bash
        run: |
          set -o pipefail
          npm run -s test:nightly:with-build 2>&1 | tee nightly-test.log

      - name: Write nightly run metadata
        if: always()
        shell: bash
        run: |
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "actor=${GITHUB_ACTOR}"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > nightly-test-metadata.txt

      - name: Upload nightly logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-log-${{ github.run_id }}
          path: |
            nightly-test.log
            nightly-test-metadata.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Notify nightly failure (GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly Input Tests failing";
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const alertLabel = (process.env.NIGHTLY_ALERT_LABEL || "ci").trim();
            const alertAssignee = (process.env.NIGHTLY_ALERT_ASSIGNEE || "").trim();
            const body = [
              "Nightly Input Tests failed.",
              "",
              `- Run: ${runUrl}`,
              `- SHA: \`${process.env.GITHUB_SHA}\``,
              `- Ref: \`${process.env.GITHUB_REF}\``,
              `- Actor: @${process.env.GITHUB_ACTOR}`,
              `- Time (UTC): ${new Date().toISOString()}`
            ].join("\n");

            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const ensureIssueRouting = async (issueNumber) => {
              if (alertLabel) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: [alertLabel]
                  });
                } catch (error) {
                  core.warning(`failed to add label '${alertLabel}': ${error.message}`);
                }
              }
              if (alertAssignee) {
                try {
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    assignees: [alertAssignee]
                  });
                } catch (error) {
                  core.warning(`failed to assign '${alertAssignee}': ${error.message}`);
                }
              }
            };

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              await ensureIssueRouting(existing.number);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              await ensureIssueRouting(created.data.number);
            }

      - name: Close nightly failure issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly Input Tests failing";
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = openIssues.find((issue) => issue.title === title);
            if (!existing) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: [
                "Nightly Input Tests recovered.",
                "",
                `- Run: ${runUrl}`,
                `- SHA: \`${process.env.GITHUB_SHA}\``,
                `- Time (UTC): ${new Date().toISOString()}`
              ].join("\n")
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed"
            });
